name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Prepare static output
        run: |
          # TanStack Start emits the client SPA assets under dist/client.
          # Provide an SPA fallback so deep links resolve via index.html.
          if [ -d dist/client ]; then
            cp dist/client/index.html dist/client/404.html || true
            echo "" > dist/client/.nojekyll
          else
            echo "dist/client not found — adjust this step for your build output."
            ls -R dist || true
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
